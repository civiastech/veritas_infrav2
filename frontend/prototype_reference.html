<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#080808;--deep:#0d0d0d;--slate:#141414;--panel:#1a1a1a;
  --panel2:#202020;--border:#252525;--border2:#2f2f2f;
  --gold:#c9a14f;--gold-l:#e0b86a;--gold-d:#8a6a28;--gold-dim:rgba(201,161,79,0.1);
  --white:#f2f0ea;--off:#c8c4ba;--gray:#6a6660;--faint:#3a3a3a;
  --red:#c0392b;--red-dim:rgba(192,57,43,0.12);
  --green:#27ae60;--green-dim:rgba(39,174,96,0.12);
  --blue:#2980b9;--blue-dim:rgba(41,128,185,0.12);
  --amber:#e67e22;--amber-dim:rgba(230,126,34,0.12);
  --font-d:'Cinzel',serif;--font-b:'Crimson Pro',serif;--font-m:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--font-b);font-size:16px;line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--gold-d)}
::selection{background:var(--gold-dim);color:var(--gold-l)}
a{color:var(--gold);text-decoration:none}
input,select,textarea{background:var(--panel);border:1px solid var(--border2);color:var(--white);font-family:var(--font-b);font-size:15px;padding:10px 14px;width:100%;outline:none;transition:border-color .2s;border-radius:0}
input:focus,select:focus,textarea:focus{border-color:var(--gold-d)}
input::placeholder,textarea::placeholder{color:var(--gray)}
select option{background:var(--panel)}
button{cursor:pointer;font-family:var(--font-d)}
.btn{border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:var(--font-d);font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:10px 24px;transition:all .25s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .25s cubic-bezier(.16,1,.3,1);z-index:0}
.btn span{position:relative;z-index:1}
.btn:hover{color:var(--black)}.btn:hover::before{transform:translateX(0)}
.btn-sm{padding:7px 16px;font-size:9px}
.btn-ghost{border-color:var(--border2);color:var(--off)}.btn-ghost:hover{border-color:var(--gold-d);color:var(--gold)}.btn-ghost::before{background:var(--gold-dim)}
.btn-danger{border-color:var(--red);color:var(--red)}.btn-danger:hover{color:#fff}.btn-danger::before{background:var(--red)}
.btn-success{border-color:var(--green);color:var(--green)}.btn-success:hover{color:#fff}.btn-success::before{background:var(--green)}
.badge{display:inline-block;padding:3px 10px;font-family:var(--font-m);font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid}
.badge-honor{color:#e0b86a;border-color:#e0b86a;text-shadow:0 0 8px rgba(224,184,106,.3)}
.badge-trusted{color:#7ab3d4;border-color:#7ab3d4}
.badge-stable{color:#8ab88a;border-color:#8ab88a}
.badge-provisional{color:var(--gray);border-color:var(--gray)}
.badge-active{color:var(--green);border-color:var(--green)}
.badge-pending{color:var(--amber);border-color:var(--amber)}
.badge-complete{color:var(--gold);border-color:var(--gold)}
.badge-locked{color:var(--red);border-color:var(--red)}
.badge-issued{color:var(--green);border-color:var(--green)}
.card{background:var(--panel);border:1px solid var(--border2);padding:24px}
.card-hover{transition:border-color .2s,transform .2s,box-shadow .2s}
.card-hover:hover{border-color:var(--gold-d);box-shadow:0 8px 32px rgba(201,161,79,.06)}
.mono{font-family:var(--font-m)}
.cinzel{font-family:var(--font-d)}
.gold{color:var(--gold)}
.label{font-family:var(--font-m);font-size:9px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;display:block}
.stat-val{font-family:var(--font-d);font-size:2rem;font-weight:700;color:var(--gold);line-height:1}
.stat-lbl{font-family:var(--font-m);font-size:9px;letter-spacing:.15em;color:var(--gray);margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-24{gap:24px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}.mb-32{margin-bottom:32px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mt-32{margin-top:32px}
.p-16{padding:16px}.p-24{padding:24px}.p-32{padding:32px}
.text-sm{font-size:.85rem}.text-xs{font-size:.75rem}.text-off{color:var(--off)}.text-gray{color:var(--gray)}
.divider{height:1px;background:var(--border2);margin:20px 0}
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px 0}
.shimmer{background:linear-gradient(90deg,var(--gold-d) 0%,var(--gold-l) 40%,var(--gold-d) 80%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.anim-fadeup{animation:fadeUp .4s ease forwards}
.pulse{animation:pulse 2s ease infinite}
.spin{animation:spin 1s linear infinite}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{font-family:var(--font-m);font-size:9px;letter-spacing:.15em;color:var(--gray);font-weight:400;text-align:left;padding:10px 16px;border-bottom:1px solid var(--border2);text-transform:uppercase}

/* TOAST */
#toast-container{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--border2);padding:14px 20px;font-size:.85rem;min-width:280px;border-left:3px solid var(--gold);animation:fadeUp .3s ease;pointer-events:all}
.toast-success{border-left-color:var(--green)}
.toast-error{border-left-color:var(--red)}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
#modal-overlay.open{display:flex}
#modal-box{background:var(--panel);border:1px solid var(--border2);max-width:680px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:fadeUp .3s ease}
#modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--gray);font-size:1.4rem;cursor:pointer;line-height:1;padding:4px 8px}
#modal-close:hover{color:var(--white)}
#modal-body{padding:32px}

/* PROGRESS BAR */
.progress{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width .6s ease}

/* SHI INDICATOR */

/* SIDEBAR NAV */
#app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
#sidebar{background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#main-content{overflow-y:auto;height:100vh}

.nav-section-label{font-family:var(--font-m);font-size:9px;letter-spacing:.2em;color:var(--gray);text-transform:uppercase;padding:20px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background .15s,color .15s;font-size:.85rem;color:var(--off);border-left:2px solid transparent}
.nav-item:hover{background:var(--panel);color:var(--white)}

.nav-badge{margin-left:auto;background:var(--gold);color:var(--black);font-family:var(--font-m);font-size:8px;padding:2px 6px;border-radius:2px}

/* PAGE HEADER */
.page-header{padding:28px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--deep);position:sticky;top:0;z-index:100}

.page-subtitle{font-family:var(--font-m);font-size:9px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}

/* CONTENT AREA */
.content-area{padding:32px}

/* FORM GROUP */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:var(--font-m);font-size:9px;letter-spacing:.15em;color:var(--gold);margin-bottom:6px;text-transform:uppercase}
.form-row{display:grid;gap:12px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--border);margin-bottom:28px}
.kpi-card{background:var(--deep);padding:20px 24px}
.kpi-val{font-family:var(--font-d);font-size:1.8rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.kpi-lbl{font-family:var(--font-m);font-size:9px;letter-spacing:.12em;color:var(--gray);text-transform:uppercase}
.kpi-delta{font-family:var(--font-m);font-size:9px;color:var(--green);margin-top:4px}

/* SHI RING */
.shi-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* EVIDENCE TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:var(--border2)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:6px;width:9px;height:9px;border-radius:50%;border:1px solid var(--gold);background:var(--black)}
.timeline-item.complete::before{background:var(--gold)}
.timeline-item.active::before{background:var(--gold);box-shadow:0 0 8px var(--gold)}

/* NOTIFICATION DOT */
.notif-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px;vertical-align:middle}

/* ROLE SWITCHER */
#role-bar{background:var(--slate);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.role-chip{padding:4px 12px;font-family:var(--font-m);font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border2);cursor:pointer;transition:all .2s;color:var(--gray)}
.role-chip:hover,.role-chip.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
//  DATABASE ENGINE — IndexedDB wrapper
// ═══════════════════════════════════════════════════════════════════
const DB = {
  db: null,
  version: 1,
  stores: ['professionals','projects','components','evidence','inspections','milestones','payments','bids','tenders','disputes','audit_log','materials','sensors','certifications','notifications'],

  async init() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('VeritasInfra', this.version);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        const stores = {
          professionals:   { keyPath:'id', autoIncrement:true },
          projects:        { keyPath:'id', autoIncrement:true },
          components:      { keyPath:'id', autoIncrement:true },
          evidence:        { keyPath:'id', autoIncrement:true },
          inspections:     { keyPath:'id', autoIncrement:true },
          milestones:      { keyPath:'id', autoIncrement:true },
          payments:        { keyPath:'id', autoIncrement:true },
          bids:            { keyPath:'id', autoIncrement:true },
          tenders:         { keyPath:'id', autoIncrement:true },
          disputes:        { keyPath:'id', autoIncrement:true },
          audit_log:       { keyPath:'id', autoIncrement:true },
          materials:       { keyPath:'id', autoIncrement:true },
          sensors:         { keyPath:'id', autoIncrement:true },
          certifications:  { keyPath:'id', autoIncrement:true },
          notifications:   { keyPath:'id', autoIncrement:true },
        };
        Object.entries(stores).forEach(([name, opts]) => {
          if (!db.objectStoreNames.contains(name)) db.createObjectStore(name, opts);
        });
      };
      req.onsuccess = e => { this.db = e.target.result; res(); };
      req.onerror = e => rej(e);
    });
  },

  async add(store, data) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).add({ ...data, createdAt: new Date().toISOString() });
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async getAll(store) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async get(store, id) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(id);
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async update(store, data) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put({ ...data, updatedAt: new Date().toISOString() });
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async delete(store, id) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).delete(id);
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async count(store) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readonly');
      const req = tx.objectStore(store).count();
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },

  async filter(store, fn) {
    const all = await this.getAll(store);
    return all.filter(fn);
  },

  async clear(store) {
    return new Promise((res, rej) => {
      const tx = this.db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).clear();
      req.onsuccess = e => res();
      req.onerror = e => rej(e);
    });
  }
};

function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<strong style="font-family:var(--font-m);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--gold)'}">${type.toUpperCase()}</strong><br>${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(), 300); }, 3500);
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function fmtCurrency(val, currency='USD') {
  if (val >= 1000000) return `${currency} ${(val/1000000).toFixed(1)}M`;
  if (val >= 1000) return `${currency} ${(val/1000).toFixed(0)}K`;
  return `${currency} ${val.toLocaleString()}`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function shiClass(s) { return s>=88 ? 'shi-high' : s>=75 ? 'shi-mid' : s>0 ? 'shi-low' : 'text-gray'; }
function bandBadge(b) { return `<span class="badge badge-${b?.toLowerCase()}">${b||'—'}</span>`; }
function statusBadge(s) {
  const map = { active:'active', complete:'complete', pending:'pending', released:'complete', locked:'locked', issued:'issued', resolved:'complete', suspended:'locked', open:'active', approved:'complete' };
  return `<span class="badge badge-${map[s]||'pending'}">${s||'—'}</span>`;
}

async function logAudit(action, detail) {
  await DB.add('audit_log', { action, actor: STATE.currentUser?.name || 'System', detail, timestamp: new Date().toISOString() });
}

function renderNav() {
  const role = STATE.getRole();
  const config = NAV_CONFIG[role] || NAV_CONFIG.admin;
  const notifCount = STATE.notifications.filter(n => !n.read).length;

  let html = '';
  config.forEach(section => {
    html += `<div class="nav-section-label">${section.section}</div>`;
    section.items.forEach(item => {
      const isActive = STATE.currentPage === item.id;
      const badge = item.badge === 'notif' && notifCount > 0
        ? `<span class="nav-badge">${notifCount}</span>` : '';
      html += `<div class="nav-item ${isActive ? 'active' : ''}" onclick="navigate('${item.id}')">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>${badge}
      </div>`;
    });
  });
  document.getElementById('main-nav').innerHTML = html;
}

function renderRoleSwitcher() {
  const roles = [
    { role:'admin', label:'Admin' },
    { role:'engineer', label:'Engineer' },
    { role:'inspector', label:'Inspector' },
    { role:'supervisor', label:'Supervisor' },
    { role:'contractor', label:'Contractor' },
  ];
  const current = STATE.getRole();
  const usersByRole = {};
  roles.forEach(r => {
    const u = SEED.professionals.find(p => p.role === r.role);
    usersByRole[r.role] = u;
  });

  document.getElementById('current-role-display').textContent = STATE.currentUser?.name || '—';
  document.getElementById('role-chips').innerHTML = roles.map(r =>
    `<div class="role-chip ${current === r.role ? 'active' : ''}" onclick="switchRole('${r.role}')">${r.label}</div>`
  ).join('');
}

async function switchRole(role) {
  const users = await DB.getAll('professionals');
  const user = users.find(u => u.role === role);
  if (user) {
    STATE.setUser(user);
    renderRoleSwitcher();
    renderNav();
    navigate('dashboard');
    toast(`Switched to ${user.name} (${role.toUpperCase()})`, 'info');
  }
}

function navigate(page) {
  STATE.currentPage = page;
  renderNav();
  renderPage(page);
  document.getElementById('main-content').scrollTop = 0;
}

    notifications: renderNotifications,
    audit: renderAudit,
  };
  const fn = pages[page] || renderDashboard;
  fn();
}

async function releasePayment(milestoneId, projectUid, amount, currency) {
  const project = (await DB.filter('projects', p => p.uid === projectUid))[0];
  if (!project) return;
  const milestone = await DB.get('milestones', milestoneId);
  if (project.shi < (milestone.required_shi || 0)) {
    toast(`Cannot release: Project SHI ${project.shi} is below required ${milestone.required_shi}`, 'error');
    return;
  }
  await DB.update('milestones', { ...milestone, status: 'released', released_date: new Date().toISOString().split('T')[0] });
  const txId = `PAY-${new Date().getFullYear()}-${Math.random().toString(36).slice(2,8).toUpperCase()}`;
  await DB.add('payments', {
    project_uid: projectUid, milestone_id: milestoneId, amount, currency,
    from_party: project.client, to_party: 'Contracted Firm',
    released_by: 'PAY™ Escrow Engine', date: new Date().toISOString().split('T')[0],
    tx_id: txId, status: 'completed',
  });
  await logAudit('PAYMENT_RELEASED', `${fmtCurrency(amount, currency)} released for ${milestone.name} on ${projectUid}. TX: ${txId}`);
  toast(`Payment ${fmtCurrency(amount, currency)} released successfully. TX: ${txId}`, 'success');
  closeModal();
  renderProjects();
}

async function submitEvidence() {

  const hash = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
  await DB.add('evidence', {
    component_uid: compUid,
    type: 'CAPTURE-LARGE',
    images: parseInt(document.getElementById('ev-imgs').value) || 5,
    submitted_by: STATE.currentUser?.id,
    approved_by: null,
    description: desc,
    timestamp: new Date().toISOString(),
    geo: document.getElementById('ev-geo').value || 'GPS locked',
    hash, status: 'pending',
  });
  // Update component status
  const comp = (await DB.filter('components', c => c.uid === compUid))[0];
  if (comp) await DB.update('components', { ...comp, status: 'evidence_submitted' });
  await logAudit('EVIDENCE_SUBMITTED', `CAPTURE-LARGE evidence submitted for ${compUid}. Hash: ${hash.slice(0,16)}`);

}

async function submitInspection() {
  const compUid = document.getElementById('ins-comp').value;
  const mat = parseFloat(document.getElementById('ins-mat').value)||0;
  const asm = parseFloat(document.getElementById('ins-asm').value)||0;
  const env = parseFloat(document.getElementById('ins-env').value)||0;
  const sup = parseFloat(document.getElementById('ins-sup').value)||0;
  const reason = document.getElementById('ins-reason').value.trim();
  if (!reason) { toast('Reason tag is mandatory.', 'error'); return; }
  const shi = parseFloat((mat*0.3 + asm*0.4 + env*0.1 + sup*0.2).toFixed(1));
  if (shi < 60) { toast(`SHI ${shi} — Critical risk. PAY™ locked. Immediate intervention required.`, 'error'); }

  await DB.add('inspections', {
    component_uid: compUid,
    inspector_id: STATE.currentUser?.id,
    shi, material_score: mat, assembly_score: asm, env_score: env, supervision_score: sup,
    ai_flags: parseInt(document.getElementById('ins-ai').value)||0,
    reason_tag: reason,
    timestamp: new Date().toISOString(),
    status: shi >= 60 ? 'passed' : 'failed',
  });

  // Update component SHI
  const comp = (await DB.filter('components', c => c.uid === compUid))[0];
  if (comp) await DB.update('components', { ...comp, shi, status: shi >= 60 ? 'verified' : 'failed' });
  await logAudit('INSPECTION_RECORDED', `SHI ${shi} recorded for ${compUid} by ${STATE.currentUser?.name}`);
  toast(`SHI ${shi} recorded for ${compUid}. ${shi < 75 ? 'REMEDIATION REQUIRED.' : 'Structure healthy.'}`, shi >= 75 ? 'success' : 'error');
  closeModal();
  renderVision();
}

}

async function submitBid(tenderUid) {
  const firm = document.getElementById('bid-firm').value.trim();
  const price = parseFloat(document.getElementById('bid-price').value);
  const cap = parseFloat(document.getElementById('bid-cap').value)||50;
  const shi = parseFloat(document.getElementById('bid-shi').value)||0;
  if (!firm || !price) { toast('Firm name and price are required.', 'error'); return; }
  const pri = STATE.currentUser?.pri_score || 50;
  const integrity = Math.round((pri * 0.5 + shi * 0.5));
  const matrix = parseFloat((integrity*0.45 + cap*0.35 + Math.min(100, 100 - Math.abs(price/1000000 - 80)*2)*0.20).toFixed(1));
  await DB.add('bids', {
    tender_uid: tenderUid, firm, price, integrity_score: integrity,
    capacity_score: cap, shi_history: shi, matrix_score: matrix,
    status: 'submitted', submitted_by: STATE.currentUser?.id,
  });
  await logAudit('BID_SUBMITTED', `${firm} submitted bid of ${fmtCurrency(price)} for ${tenderUid}. MATRIX-C: ${matrix}`);
  toast(`Bid submitted. Your MATRIX-C score: ${matrix}`, 'success');
  closeModal();
  renderMarket();
}

async function awardTender(tenderUid) {
  const bids = await DB.filter('bids', b => b.tender_uid === tenderUid);
  const winner = bids.sort((a,b)=>b.matrix_score-a.matrix_score)[0];
  if (!winner) { toast('No bids to award.', 'error'); return; }
  const t = (await DB.filter('tenders', t => t.uid === tenderUid))[0];
  await DB.update('tenders', { ...t, status: 'awarded', winner: winner.firm });

async function submitMaterial() {
  const uid = document.getElementById('m-uid').value.trim();
  const test = parseInt(document.getElementById('m-test').value)||0;
  const req = parseInt(document.getElementById('m-req').value)||0;
  if (!uid) { toast('Batch UID required.', 'error'); return; }
  await DB.add('materials', {
    batch_uid: uid, name: document.getElementById('m-name').value,
    grade: document.getElementById('m-grade').value, supplier: document.getElementById('m-supplier').value,
    country: document.getElementById('m-country').value,
    cert_number: document.getElementById('m-cert').value,
    verified: test >= req, projects_used: [],
    test_strength: test, required_strength: req,
    status: test >= req ? 'approved' : 'pending',
  });

  toast(`Material batch ${uid} registered. ${test>=req?'Test passed.':'Test strength below required — review needed.'}`, test>=req?'success':'error');

  renderOrigin();

async function suspendMaterial(id) {
  const m = await DB.get('materials', id);
  const reason = prompt('Reason for suspension:');
  if (!reason) return;
  await DB.update('materials', { ...m, status:'suspended', suspension_reason: reason, verified: false });
  await logAudit('MATERIAL_SUSPENDED', `Batch ${m.batch_uid} suspended: ${reason}`);
  toast(`Batch ${m.batch_uid} suspended.`, 'error');
  renderOrigin();
}

  }));

  document.getElementById('page-root').innerHTML = `

    ...d, status: 'resolved', resolution: res,
    resolved_date: new Date().toISOString().split('T')[0],
    arbitrator_id: STATE.currentUser?.id,
  });
  await logAudit('DISPUTE_RESOLVED', `${d.uid} resolved by ${STATE.currentUser?.name}`);
  toast(`Dispute ${d.uid} resolved. Determination recorded in TWIN™.`, 'success');
  closeModal();
  renderLex();
}

async function markRead(id) {
  const n = await DB.get('notifications', id);
  await DB.update('notifications', { ...n, read: true });
  renderNotifications();
  renderNav();
}

async function markAllRead() {
  const all = await DB.getAll('notifications');
  await Promise.all(all.map(n => DB.update('notifications', { ...n, read: true })));
  STATE.notifications = [];
  renderNotifications();
  renderNav();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
async function seedIfEmpty() {
  const count = await DB.count('professionals');
  if (count > 0) return;
  for (const store of Object.keys(SEED)) {
    for (const item of SEED[store]) {
      await DB.add(store, item);
    }
  }
}

async function init() {
  await DB.init();
  await seedIfEmpty();
  document.getElementById('db-status').textContent = 'DB: IndexedDB Online';

  // Load notifications for badge
  STATE.notifications = await DB.filter('notifications', n => !n.read);

  // Default user: admin
  const users = await DB.getAll('professionals');
  const admin = users.find(u => u.role === 'admin');
  STATE.setUser(admin);

  renderRoleSwitcher();
  renderNav();
  navigate('dashboard');
}

// Start
init().catch(err => {
  console.error('Init error:', err);
  document.getElementById('page-root').innerHTML = `<div style="padding:40px;color:var(--red)">Initialisation error: ${err.message}</div>`;
});
</script>
