services:
  postgres:
    image: postgres:16-alpine
    container_name: veritas_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veritas}
      POSTGRES_USER: ${POSTGRES_USER:-veritas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veritas_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veritas} -d ${POSTGRES_DB:-veritas}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: veritas_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: veritas_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: veritas_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set veritas http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}); do
        echo 'waiting for minio' && sleep 2;
      done;
      /usr/bin/mc mb -p veritas/${MINIO_BUCKET_EVIDENCE:-veritas-evidence} || true;
      exit 0;
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: veritas_backend
    env_file:
      - .env
    environment:
      APP_NAME: Veritas Infra API
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-veritas}:${POSTGRES_PASSWORD:-veritas_change_me}@postgres:5432/${POSTGRES_DB:-veritas}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@visc.org}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-AdminPass123!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,*}
      UPLOADS_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_EVIDENCE: ${MINIO_BUCKET_EVIDENCE:-veritas-evidence}
      MINIO_SECURE: "false"
      AUTO_CREATE_TABLES: "false"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")'"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8000:8000"
    restart: unless-stopped

  seed:
    build:
      context: ./backend
    container_name: veritas_seed
    env_file:
      - .env
    environment:
      APP_NAME: Veritas Infra API
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-veritas}:${POSTGRES_PASSWORD:-veritas_change_me}@postgres:5432/${POSTGRES_DB:-veritas}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@visc.org}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-AdminPass123!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,*}
      UPLOADS_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_EVIDENCE: ${MINIO_BUCKET_EVIDENCE:-veritas-evidence}
      MINIO_SECURE: "false"
      AUTO_CREATE_TABLES: "false"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    command: python -m app.seed
    restart: "no"
    profiles:
      - ops

  worker:
    build:
      context: ./backend
    container_name: veritas_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-veritas}:${POSTGRES_PASSWORD:-veritas_change_me}@postgres:5432/${POSTGRES_DB:-veritas}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_EVIDENCE: ${MINIO_BUCKET_EVIDENCE:-veritas-evidence}
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: celery -A app.app_celery.celery_app worker --loglevel=info
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: veritas_nginx
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: veritas_prometheus
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: veritas_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  redis_data:
  minio_data:
  grafana_data: