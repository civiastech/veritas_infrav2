name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          JWT_SECRET_KEY: ci-test-secret
          DATABASE_URL: sqlite:///./test.db
          ENVIRONMENT: testing
          MINIO_ENABLED: 'false'
          REDIS_ENABLED: 'false'
          AUTO_CREATE_TABLES: 'true'
        run: pytest -q --tb=short

  preflight:
    name: Check deployment secrets
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      deploy_ready: ${{ steps.check.outputs.deploy_ready }}
    steps:
      - id: check
        run: |
          if [ -n "$SSH_KEY" ]; then
            echo "deploy_ready=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_ready=false" >> $GITHUB_OUTPUT
            echo "SSH_PRIVATE_KEY secret not configured — skipping deployment"
          fi
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, preflight]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.preflight.outputs.deploy_ready == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server host key
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy
        env:
          H: ${{ secrets.SERVER_HOST }}
          U: ${{ secrets.SERVER_USER }}
          D: ${{ secrets.DEPLOY_DIR }}
        run: |
          ssh $U@$H "set -e
          cd $D
          git pull origin main
          docker compose --env-file .env.production -f docker-compose.prod.yml build backend worker
          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T backend alembic upgrade head
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --no-deps backend worker
          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T nginx nginx -s reload || true"
      - name: Smoke test
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://${{ secrets.SERVER_HOST }}/health)
          [ "$STATUS" = '200' ] && echo OK || exit 1
